<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مسابقة عبدالله 🌟</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin:0;
  padding:0;
  min-height: 100vh;
  color: white;
  background-image: url('https://i.pinimg.com/736x/14/cf/e9/14cfe9109c3c3b46d59686696518639b.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.box {
  margin: 50px auto;
  padding: 25px;
  background: rgba(0,0,50,0.7);
  border-radius: 15px;
  width: 90%;
  max-width: 600px;
  box-shadow: 0 0 15px #00ccff;
}

h1 { color: #00ccff; margin-bottom: 15px; }
h2 { margin-bottom: 15px; }

button {
  display: block;
  margin: 8px auto;
  padding: 12px;
  width: 65%;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #00ccff;
  color: white;
  font-weight: bold;
  font-size: 16px;
}
button:hover { background: #33d6ff; }

/* تعديل لون زر إظهار/إخفاء الإجابة */
#showAnswerBtn { 
  opacity: 0.1; 
  font-size: 12px; 
  color: red; 
}
#showAnswerBtn:hover { 
  opacity: 1; 
}

/* تعديل أزرار التالي والسابق */
button.nextPrevBtn {
  background-color: orange; 
  color: black; 
}
button.nextPrevBtn:hover {
  background-color: darkorange; 
}

#correctAnswer { color: #00ffcc; font-weight: bold; margin-top:10px; }
#result { margin-top:10px; font-size:18px; }

.teamBox {
  display:flex;
  justify-content:space-around;
  margin:15px 0;
}
.team { width:45%; }
.barOuter {
  background: rgba(255,255,255,0.2);
  height:25px;
  border-radius:8px;
  margin:5px 0;
}
.barInner {
  height:100%;
  border-radius:8px;
  width:0%;
  transition: width 0.5s;
}
.green { background: #00cc00; }
.orange { background: #ff9900; }
.teamLabel { margin-bottom:5px; }
</style>
</head>
<body>

<div class="box">
<h1>🌟 مسابقة عبدالله 🌟</h1>

<h2 id="question"></h2>
<div id="answers"></div>
<p id="result"></p>
<p id="correctAnswer"></p>
<button id="showAnswerBtn" onclick="toggleAnswer()">إظهار الإجابة</button>
<button class="nextPrevBtn" onclick="nextQuestion()">➡️ السؤال التالي</button>
<button class="nextPrevBtn" onclick="prevQuestion()">⬅️ السؤال السابق</button>

<div class="teamBox">
  <div class="team">
    <div class="teamLabel">الفريق الأخضر</div>
    <div class="barOuter"><div id="greenBar" class="barInner green"></div></div>
    <button onclick="addPoint('green')">✅ +1</button>
  </div>
  <div class="team">
    <div class="teamLabel">الفريق البرتقالي</div>
    <div class="barOuter"><div id="orangeBar" class="barInner orange"></div></div>
    <button onclick="addPoint('orange')">✅ +1</button>
  </div>
</div>
<p id="scoreText">نقاط الفرق: الأخضر 0 - البرتقالي 0</p>

</div>

<script>
// ----- 70 سؤال وفزورة جاهزة للأطفال -----
let questions = [
{type:"choice",q:"ما لون السماء في النهار؟",a:["أزرق","أخضر","أحمر","أصفر"],correct:0},
{type:"choice",q:"كم عدد أصابع اليد؟",a:["4","5","6","7"],correct:1},
{type:"choice",q:"أي حيوان يسمى ملك الغابة؟",a:["الأسد","القطة","الفيل","الأرنب"],correct:0},
{type:"choice",q:"ما أول شهر في السنة؟",a:["محرم","رمضان","صفر","شعبان"],correct:0},
{type:"choice",q:"ما هو الحيوان الذي يطير؟",a:["السمكة","الصقر","الأسد","الزرافة"],correct:1},

{type:"riddle",q:"شيء يمشي بلا قدمين ويبكي بلا عينين؟",answer:"السحاب"},
{type:"riddle",q:"شيء كلما أخذت منه كبر؟",answer:"الحفرة"},
{type:"riddle",q:"له أسنان ولا يعض؟",answer:"المشط"},
{type:"riddle",q:"ما الشيء الذي يوجد في كل مكان وفي كل بيت لكنه لا يرى؟",answer:"الهواء"},
{type:"riddle",q:"ما الشيء الذي كلما زاد نقص؟",answer:"العمر"},

{type:"choice",q:"ما لون التفاح الشائع؟",a:["أحمر","أسود","أزرق","بنفسجي"],correct:0},
{type:"choice",q:"كم عدد أيام الأسبوع؟",a:["5","6","7","8"],correct:2},
{type:"choice",q:"أي حيوان يعيش في الماء؟",a:["الأسد","السمك","الكلب","أرنب"],correct:1},
{type:"choice",q:"أين يعيش البطريق؟",a:["الصحراء","القطب الجنوبي","الغابة","الجزيرة"],correct:1},
{type:"choice",q:"ما هو أكبر كوكب؟",a:["الأرض","المريخ","المشتري","الزهرة"],correct:2},

{type:"riddle",q:"ما هو الشيء الذي يكسو الناس ويظلهم؟",answer:"الملابس"},
{type:"riddle",q:"ما هو الشيء الذي يطير بلا جناح؟",answer:"الوقت"},
{type:"riddle",q:"ما هو الشيء الذي ينبض بلا قلب؟",answer:"الساعة"},
{type:"riddle",q:"له أرجل ولكنه لا يمشي؟",answer:"الكرسي"},
{type:"riddle",q:"ما الشيء الذي يتحرك ولا يرى؟",answer:"الريح"},

{type:"choice",q:"كم عدد الحواس عند الإنسان؟",a:["3","4","5","6"],correct:2},
{type:"choice",q:"ما لون الصندوق الاسود بطائرات؟",a:["البرتقالي","أحمر","وردي","أبيض"],correct:0},
{type:"choice",q:"أي حيوان له خرطوم طويل؟",a:["الفيل","الأسد","القرد","الزرافة"],correct:0},
{type:"choice",q:"ما أول حرف من الأبجدية؟",a:["أ","ب","ج","د"],correct:0},
{type:"choice",q:"كم عدد أيام السنة؟",a:["360","365","366","370"],correct:1},

{type:"riddle",q:"له قلب لا ينبض؟",answer:"الخس"},
{type:"riddle",q:"ما الشيء الذي يسير للأمام ولا يعود؟",answer:"الوقت"},
{type:"riddle",q:"ما الشيء الذي يتكلم جميع اللغات؟",answer:"الصدى"},
{type:"riddle",q:"ما الشيء الذي يملأ الغرفة بلا وزن؟",answer:"الضوء"},
{type:"riddle",q:"ما الشيء الذي يكون أخضر في الأرض وأسود في السوق وأحمر في البيت؟",answer:"الشاي"},

{type:"choice",q:"أي حيوان يصرخ ليلاً ويعيش في الغابة؟",a:["الأسد","البومة","الضفدع","القط"],correct:1},
{type:"choice",q:"ما هو الحيوان الأسرع في العالم؟",a:["الفهد","الأسد","الظبي","الأرنب"],correct:0},
{type:"choice",q:"كم عدد كواكب المجموعة الشمسية؟",a:["7","8","9","10"],correct:1},
{type:"choice",q:"أي فاكهة لونها أصفر وطويلة؟",a:["الموز","التفاح","البرتقال","العنب"],correct:0},
{type:"choice",q:"ما لون ورقة الشجر في الخريف غالباً؟",a:["أخضر","أصفر وبرتقالي","أزرق","أحمر"],correct:1},

{type:"riddle",q:"أبيض وأسود وأسكن في البراري؟",answer:"الحمار الوحشي"},
{type:"riddle",q:"شيء يوجد في البحر ولا يبتل؟",answer:"الضوء"},
{type:"riddle",q:"له رقبة طويلة ويأكل أوراق الشجر؟",answer:"الزرافة"},
{type:"riddle",q:"شيء له عين واحده ولا يرى؟",answer:"الإبرة"},
{type:"riddle",q:"ما الشيء الذي ينكسر بمجرد أن تسمعه؟",answer:"الصمت"},

{type:"choice",q:"أي يوم يلي الأحد؟",a:["الاثنين","الثلاثاء","الأربعاء","الخميس"],correct:0},
{type:"choice",q:"ما هو الحيوان الذي يعيش أطول عمر؟",a:["الفيل","السلحفاة","الأسد","الديك"],correct:1},
{type:"choice",q:"ما لون الفراولة؟",a:["أحمر","أزرق","أصفر","أخضر"],correct:0},
{type:"choice",q:"كم عدد أيام شهر فبراير في سنة بسيطة؟",a:["28","29","30","31"],correct:0},
{type:"choice",q:"أي حيوان يطير بالليل؟",a:["النعامة","البومة","الحمامة","العصفور"],correct:1},

{type:"riddle",q:"ما هو الشيء الذي يكتب ولا يقرأ؟",answer:"القلم"},
{type:"riddle",q:"له حبات ويتحرك في الحقل؟",answer:"الذرة"},
{type:"riddle",q:"شيء له ارجل ويجلس عليه الناس؟",answer:"الكرسي"},
{type:"riddle",q:"أبيض وأسود وأسكن في ثلوج؟",answer:"البطريق"},
{type:"riddle",q:"ما الشيء الذي كلما أخذت منه زاد؟",answer:"الحفرة"},

{type:"choice",q:"ما لون البحر غالباً؟",a:["أزرق","أخضر","أحمر","أسود"],correct:0},
{type:"choice",q:"أي حيوان ينام واقفاً؟",a:["الحصان","الأسد","الفيل","الغزال"],correct:0},
{type:"choice",q:"من هو ابو البشر ؟",a:["نوح عليه السلام","ادم عليه السلام","محمد صلى الله عليه وسلم","عيسى عليه السلام"],correct:1},
{type:"choice",q:"أي كوكب يُعرف بالكوكب الأحمر؟",a:["المريخ","الزهرة","المشتري","الزهرة"],correct:0},
{type:"choice",q:"كم عدد أرجل العنكبوت؟",a:["6","8","10","12"],correct:1},

{type:"riddle",q:"له أسنان كثيرة ولا يعض؟",answer:"المشط"},
{type:"riddle",q:"ما الشيء الذي إذا لمسته صاح ؟",answer:"الجرس"},
{type:"riddle",q:"ما هو الشيء الذي يقرصك و لا تراه ؟",answer:"الجوع"},
{type:"riddle",q:"ما الشيء الذي يدخل البيت بلا مفتاح؟",answer:"الهواء"},
{type:"riddle",q:"ما هو الشيء الذي يسمع بلا أذن و يتكلم بلا لسان ؟",answer:"الهاتف"}
];

// ----- إعدادات المسابقة -----
let current = 0;
let attempts = 0;
let maxAttempts = 2;
let teamScores = {green:0, orange:0};

function loadQuestion() {
  attempts=0;
  let q = questions[current];
  document.getElementById("question").innerText = "السؤال " + (current+1) + "/" + questions.length + ": " + q.q;

  let answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  document.getElementById("result").innerText = "";
  document.getElementById("correctAnswer").innerText = "";
  document.getElementById("showAnswerBtn").innerText = "إظهار الإجابة";

  if(q.type==="choice"){
    q.a.forEach((ans,i)=>{
      let btn = document.createElement("button");
      btn.innerText = ans;
      btn.onclick = ()=>checkAnswer(i);
      answersDiv.appendChild(btn);
    });
  } else if(q.type==="riddle"){
    answersDiv.innerHTML = "<i>فزورة بدون خيارات</i>";
  }
}

function checkAnswer(i){
  let q = questions[current];
  if(attempts>=maxAttempts) return;
  if(i===q.correct){
    document.getElementById("result").innerText="✔ إجابة صحيحة";
    disableAnswers();
  } else {
    attempts++;
    if(attempts>=maxAttempts){
      document.getElementById("result").innerText="❌ انتهت المحاولات";
      disableAnswers();
    } else {
      document.getElementById("result").innerText="❌ حاول مرة أخرى";
    }
  }
}

function disableAnswers(){
  document.querySelectorAll("#answers button").forEach(btn=>btn.disabled=true);
}

function nextQuestion(){
  current++;
  if(current < questions.length){
    loadQuestion();
  } else {
    document.getElementById("question").innerText="انتهت المسابقة 🎉";
    document.getElementById("answers").innerHTML="";
    document.getElementById("result").innerText="نهاية المسابقة";
  }
}

// ✅ إضافة وظيفة السؤال السابق
function prevQuestion(){
  if(current > 0){
    current--;
    loadQuestion();
  }
}

function toggleAnswer(){
  let box = document.getElementById("correctAnswer");
  let q = questions[current];
  if(box.innerText===""){
    if(q.type==="choice"){
      box.innerText="الإجابة الصحيحة: " + q.a[q.correct];
    } else if(q.type==="riddle"){
      box.innerText="الإجابة الصحيحة: " + q.answer;
    }
    document.getElementById("showAnswerBtn").innerText="إخفاء الإجابة";
  } else {
    box.innerText="";
    document.getElementById("showAnswerBtn").innerText="إظهار الإجابة";
  }
}

function addPoint(team){
  teamScores[team]++;
  updateTeamBars();
}

function updateTeamBars(){
  let totalPoints = Math.max(teamScores.green, teamScores.orange, 1);
  let greenPercent = (teamScores.green / totalPoints) * 100;
  let orangePercent = (teamScores.orange / totalPoints) * 100;

  document.getElementById("greenBar").style.width = greenPercent + "%";
  document.getElementById("orangeBar").style.width = orangePercent + "%";
  document.getElementById("scoreText").innerText =
    "نقاط الفرق: الأخضر " + teamScores.green + " - البرتقالي " + teamScores.orange;
}

loadQuestion();
</script>

</body>
</html>
